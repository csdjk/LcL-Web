<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCL Admin — 登录</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070e; --bg1: #0c0c18; --bg2: #141420;
  --border: rgba(0,212,255,0.15); --border-h: rgba(0,212,255,0.5);
  --cyan: #00d4ff; --cyan-dim: rgba(0,212,255,0.12);
  --red: #ff4466; --green: #00e5a0;
  --text: #d0d0e8; --text2: #7070a0; --text3: #404060;
  --radius: 8px; --font: 'Segoe UI', system-ui, sans-serif;
}
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px 48px; width: 380px; text-align: center;
  box-shadow: 0 0 60px rgba(0,212,255,0.08);
}
.login-logo { font-size: 22px; font-weight: 700; color: var(--cyan); letter-spacing: .1em; margin-bottom: 8px; }
.login-sub  { font-size: 12px; color: var(--text2); margin-bottom: 32px; }
.login-box input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 10px 14px;
  font-size: 14px; outline: none; margin-bottom: 14px; text-align: center;
  letter-spacing: .12em; transition: border-color .15s; font-family: var(--font);
}
.login-box input:focus { border-color: var(--border-h); }
.login-btn {
  width: 100%; background: var(--cyan); color: #000; font-weight: 700;
  border: none; border-radius: 8px; padding: 11px 0; font-size: 14px;
  cursor: pointer; transition: filter .15s;
}
.login-btn:hover { filter: brightness(1.1); }
.login-err { font-size: 12px; color: var(--red); margin-top: 12px; min-height: 18px; }
.login-hint { font-size: 11px; color: var(--text3); margin-top: 16px; }

/* ── Divider ── */
.login-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 22px 0 0; color: var(--text3); font-size: 11px;
}
.login-divider::before, .login-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── Change password toggle ── */
.login-toggle-pwd {
  background: none; border: none; color: var(--text2);
  font-size: 12px; cursor: pointer; margin-top: 10px;
  text-decoration: underline; text-underline-offset: 3px;
  transition: color .15s;
}
.login-toggle-pwd:hover { color: var(--cyan); }

.login-change-box {
  display: none; margin-top: 14px; text-align: left;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
}
.login-change-box.open { display: block; }
.login-change-box label {
  font-size: 11px; color: var(--text2); display: block;
  margin-bottom: 4px; margin-top: 10px;
}
.login-change-box label:first-of-type { margin-top: 0; }
.login-change-box input {
  text-align: left; letter-spacing: normal; font-size: 13px;
}
.login-change-btn {
  width: 100%; margin-top: 12px; background: var(--bg1);
  border: 1px solid var(--border-h); color: var(--cyan);
  border-radius: 8px; padding: 9px 0; font-size: 13px;
  cursor: pointer; transition: background .15s;
}
.login-change-btn:hover { background: var(--cyan-dim); }
#login-change-msg { font-size: 12px; margin-top: 10px; min-height: 16px; text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">⟨ LCL Admin ⟩</div>
  <div class="login-sub">内容管理系统 · 请输入访问密码</div>
  <input type="password" id="login-pwd" placeholder="Password" autocomplete="current-password">
  <button class="login-btn" id="login-btn">进入管理面板</button>
  <div class="login-err" id="login-err"></div>
  <div class="login-hint">提示：默认密码 lcl2024</div>

  <div class="login-divider">或</div>
  <button class="login-toggle-pwd" id="login-toggle-pwd">修改密码</button>
  <div class="login-change-box" id="login-change-box">
    <label>当前密码</label>
    <input type="password" id="lc-cur" placeholder="当前密码" autocomplete="current-password">
    <label>新密码（至少 6 位）</label>
    <input type="password" id="lc-new" placeholder="新密码" autocomplete="new-password">
    <label>确认新密码</label>
    <input type="password" id="lc-confirm" placeholder="再次输入" autocomplete="new-password">
    <button class="login-change-btn" id="lc-submit">确认修改</button>
    <div id="login-change-msg"></div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const PWD_HASH       = '2e3b28f57023aa68a89723fd3dce5762f6362efa4830decc5d8ae2e0a229356f';
  const SESSION_KEY    = 'lcl_admin_auth';
  const STORED_HASH_KEY = 'lcl_pwd_hash';

  // If already authenticated, go straight to editor
  if (localStorage.getItem(SESSION_KEY) === '1') {
    window.location.replace('admin.html');
  }

  function getPwdHash() { return localStorage.getItem(STORED_HASH_KEY) || PWD_HASH; }

  // ── Pure-JS SHA-256 (works on file://) ──────────────────────────────────
  function sha256Sync(msg) {
    function rr(x,n){return (x>>>n)|(x<<(32-n));}
    const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
             0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
             0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
             0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
             0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
             0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
             0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
             0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    const bytes=new TextEncoder().encode(msg);
    const len=bytes.length;
    const bits=len*8;
    const padLen=((len+9)%64===0?64:64-((len+9)%64))+len+9;
    const buf=new Uint8Array(padLen);
    buf.set(bytes);buf[len]=0x80;
    const dv=new DataView(buf.buffer);
    dv.setUint32(padLen-4,bits>>>0,false);
    dv.setUint32(padLen-8,Math.floor(bits/0x100000000),false);
    for(let i=0;i<padLen;i+=64){
      const w=new Uint32Array(64);
      for(let j=0;j<16;j++)w[j]=dv.getUint32(i+j*4,false);
      for(let j=16;j<64;j++){const s0=rr(w[j-15],7)^rr(w[j-15],18)^(w[j-15]>>>3);const s1=rr(w[j-2],17)^rr(w[j-2],19)^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+w[j-1]+s1)>>>0;}
      let[a,b,c,d,e,f,g,hh]=[...h];
      for(let j=0;j<64;j++){const S1=rr(e,6)^rr(e,11)^rr(e,25);const ch=(e&f)^(~e&g);const t1=(hh+S1+ch+K[j]+w[j])>>>0;const S0=rr(a,2)^rr(a,13)^rr(a,22);const maj=(a&b)^(a&c)^(b&c);const t2=(S0+maj)>>>0;hh=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;}
      h[0]=(h[0]+a)>>>0;h[1]=(h[1]+b)>>>0;h[2]=(h[2]+c)>>>0;h[3]=(h[3]+d)>>>0;
      h[4]=(h[4]+e)>>>0;h[5]=(h[5]+f)>>>0;h[6]=(h[6]+g)>>>0;h[7]=(h[7]+hh)>>>0;
    }
    return h.map(v=>v.toString(16).padStart(8,'0')).join('');
  }

  async function sha256(str) {
    try {
      if (crypto && crypto.subtle) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
      }
    } catch(e) { /* fallback */ }
    return sha256Sync(str);
  }

  // ── Login ────────────────────────────────────────────────────────────────
  const loginBtn = document.getElementById('login-btn');
  const loginInp = document.getElementById('login-pwd');
  const loginErr = document.getElementById('login-err');

  async function tryLogin() {
    try {
      const hash = await sha256(loginInp.value);
      if (hash === getPwdHash()) {
        localStorage.setItem(SESSION_KEY, '1');
        window.location.replace('admin.html');
      } else {
        loginErr.textContent = '密码错误，请重试';
        loginInp.value = '';
        loginInp.focus();
      }
    } catch(e) {
      loginErr.textContent = '登录失败: ' + e.message;
    }
  }
  loginBtn.addEventListener('click', tryLogin);
  loginInp.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); loginErr.textContent = ''; });
  loginInp.focus();

  // ── Change password ──────────────────────────────────────────────────────
  const toggleBtn = document.getElementById('login-toggle-pwd');
  const changeBox = document.getElementById('login-change-box');
  const lcSubmit  = document.getElementById('lc-submit');
  const lcMsg     = document.getElementById('login-change-msg');

  toggleBtn.addEventListener('click', () => {
    const open = changeBox.classList.toggle('open');
    toggleBtn.textContent = open ? '取消' : '修改密码';
  });

  lcSubmit.addEventListener('click', async () => {
    const cur     = document.getElementById('lc-cur').value;
    const newPwd  = document.getElementById('lc-new').value;
    const confirm = document.getElementById('lc-confirm').value;
    lcMsg.style.color = 'var(--red)';
    if (!cur)               { lcMsg.textContent = '请输入当前密码'; return; }
    if (newPwd.length < 6)  { lcMsg.textContent = '新密码至少 6 位'; return; }
    if (newPwd !== confirm)  { lcMsg.textContent = '两次密码不一致'; return; }
    const curHash = await sha256(cur);
    if (curHash !== getPwdHash()) {
      lcMsg.textContent = '当前密码错误';
      document.getElementById('lc-cur').value = '';
      return;
    }
    const newHash = await sha256(newPwd);
    localStorage.setItem(STORED_HASH_KEY, newHash);
    document.getElementById('lc-cur').value     = '';
    document.getElementById('lc-new').value     = '';
    document.getElementById('lc-confirm').value = '';
    lcMsg.style.color = 'var(--green)';
    lcMsg.textContent = '✓ 密码已修改，请用新密码登录';
    toggleBtn.textContent = '修改密码';
    changeBox.classList.remove('open');
  });
})();
</script>
</body>
</html>
